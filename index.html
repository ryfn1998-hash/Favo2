<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Favo 2 AI Beta - FR</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Noto+Sans+TC:wght@300;500;700&display=swap');
        :root { --bg-black: #08080a; --input-bg: #121214; --accent-blue: #00f2ff; --tech-blue: #0072ff; --error-red: #ff4b2b; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; background: var(--bg-black); color: #fff; height: 100dvh; font-family: 'Noto Sans TC', sans-serif; overflow: hidden; }
        
        #app { display: flex; flex-direction: column; height: 100dvh; }
        .top-bar { height: 2px; width: 100%; background: linear-gradient(90deg, transparent, var(--tech-blue), var(--accent-blue), transparent); }
        .header { padding: 12px 0; text-align: center; border-bottom: 1px solid #1a1a1a; background: rgba(8,8,10,0.95); backdrop-filter: blur(10px); }
        .title-main { font-family: 'Orbitron', sans-serif; font-size: 18px; font-weight: 900; color: var(--accent-blue); letter-spacing: 2px; }

        /* 聊天容器 */
        .chat-container { flex: 1; overflow-y: auto; padding: 20px 8%; display: none; flex-direction: column; gap: 20px; }
        #thinking { display: none; text-align: center; color: var(--accent-blue); font-size: 11px; padding: 10px; font-family: 'Orbitron'; letter-spacing: 2px; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        /* 訊息樣式 */
        .msg-wrap { display: flex; flex-direction: column; width: 100%; }
        .ai-msg-wrap { align-items: flex-start; }
        .user-msg-wrap { align-items: flex-end; }
        .ai-msg { background: #161618; padding: 16px 20px; border-radius: 4px 18px 18px 18px; font-size: 16px; border: 1px solid #222; color: #ddd; line-height: 1.7; max-width: 90%; }
        .user-msg { background: var(--tech-blue); padding: 12px 20px; border-radius: 18px 18px 4px 18px; font-size: 16px; max-width: 85%; color: #fff; }

        /* 🔴 錯誤狀態樣式 */
        .error-msg { border: 1px solid var(--error-red) !important; color: var(--error-red) !important; background: rgba(255, 75, 43, 0.05) !important; }

        .footer { padding: 10px 5% calc(20px + env(safe-area-inset-bottom)); background: var(--bg-black); border-top: 1px solid #1a1a1a; }
        .input-bar { background: var(--input-bg); border-radius: 16px; display: flex; align-items: center; padding: 8px 10px 8px 18px; border: 1px solid #252525; }
        input[type="text"] { flex: 1; background: transparent; border: none; color: #fff; outline: none; font-size: 16px; }
        .send-btn { background: var(--tech-blue); color: #fff; border: none; padding: 10px 20px; border-radius: 12px; font-weight: 900; cursor: pointer; font-family: 'Orbitron'; font-size: 11px; }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; background: #222; }
    </style>
</head>
<body>

<div id="app">
    <div class="top-bar"></div>
    <div class="header"><div class="title-main">FAVO AI 2 BETA</div></div>
    
    <div id="chat-box" class="chat-container" style="display: flex;"></div>
    <div id="thinking">FR_AI核心加載中...</div>

    <div class="footer">
        <div class="input-bar">
            <input type="text" id="user-input" placeholder="傳送指令給Favo 2..." autocomplete="off">
            <button id="btn-send" class="send-btn">SEND</button>
        </div>
    </div>
</div>

<script>
    const WEBHOOK = "https://discord.com/api/webhooks/1487280772187689060/J60BaNv4ZAFn4nJpSX8ieWP9WnqU1MPLrLJRAMqSVSOj3T9iZfQGuw5b6b31hafiH8Qq";
    let isProcessing = false;
    let chatHistory = [];

    // 發送邏輯
    async function handleSend() {
        const input = document.getElementById('user-input');
        const btn = document.getElementById('btn-send');
        const text = input.value.trim();

        if (!text || isProcessing) return;

        // 鎖定 UI
        isProcessing = true;
        input.disabled = true;
        btn.disabled = true;
        document.getElementById('thinking').style.display = 'block';

        addMsg('user', text);
        input.value = '';

        try {
            // 建立背景脈絡（取最後兩則避免過載）
            const context = chatHistory.slice(-2).join("\n");
            const prompt = context ? `Context: ${context}\nUser: ${text}` : text;
            
            // 請求 API
            const res = await fetch(`https://text.pollinations.ai/${encodeURIComponent(prompt)}?model=openai&search=true`);
            
            // 💡 關鍵偵測：如果 API 回傳不正常
            if (!res.ok) throw new Error("API_DOWN");

            const data = await res.text();
            if (!data || data.length < 2) throw new Error("EMPTY_DATA");

            // 成功回覆
            const cleanData = data.replace(/OpenAI|GPT/gi, 'Favo');
            addMsg('ai', cleanData);
            chatHistory.push(`U:${text}`, `A:${cleanData.substring(0, 50)}`);
            if(chatHistory.length > 4) chatHistory.shift();

        } catch (err) {
            // 🔴 錯誤處理：跳出測試版專用錯誤訊息
            const errorMsg = "⚠️ [FR_CORE_ERROR]: 數據鏈路回傳異常。\n\n原因：可能是伺服器過載或 API 暫時阻斷。請嘗試重新整理頁面或稍後再試。";
            addMsg('ai', errorMsg, true);
            
            // 同步錯誤到 Discord
            syncError(text, err.message);
        } finally {
            // 解鎖 UI
            isProcessing = false;
            input.disabled = false;
            btn.disabled = false;
            document.getElementById('thinking').style.display = 'none';
            input.focus();
        }
    }

    function addMsg(role, content, isError = false) {
        const cb = document.getElementById('chat-box');
        const div = document.createElement('div');
        div.className = `msg-wrap ${role}-wrap`;
        
        // 如果是錯誤，加入 error-msg class
        const errorClass = isError ? 'error-msg' : '';
        div.innerHTML = `<div class="${role === 'user' ? 'user-msg' : 'ai-msg'} ${errorClass}">${content.replace(/\n/g, '<br>')}</div>`;
        
        cb.appendChild(div);
        cb.scrollTop = cb.scrollHeight;
    }

    async function syncError(userQuery, errorDetail) {
        try {
            const payload = {
                username: "Favo 2 Beta",
                embeds: [{
                    title: "❌ 核心回覆錯誤",
                    color: 0xff4b2b,
                    fields: [
                        { name: "用戶輸入", value: userQuery },
                        { name: "錯誤代碼", value: errorDetail }
                    ],
                    timestamp: new Date().toISOString()
                }]
            };
            fetch(WEBHOOK, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        } catch(e) {}
    }

    document.getElementById('btn-send').onclick = handleSend;
    document.getElementById('user-input').onkeydown = (e) => { if(e.key === 'Enter') handleSend(); };
</script>
</body>
</html>
