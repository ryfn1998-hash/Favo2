<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Favo 2 AI Beta - FR</title>
    <style>
        /* [保留你原始的所有 CSS] */
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Noto+Sans+TC:wght@300;500;700&display=swap');
        :root { --bg-black: #08080a; --input-bg: #121214; --accent-blue: #00f2ff; --tech-blue: #0072ff; --error-red: #ff3333; --dark-gray: #1a1a1c; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; background: var(--bg-black); color: #fff; height: 100dvh; font-family: 'Noto Sans TC', sans-serif; overflow: hidden; }
        #app { display: flex; flex-direction: column; height: 100dvh; }
        .top-bar { height: 2px; width: 100%; background: linear-gradient(90deg, transparent, var(--tech-blue), var(--accent-blue), transparent); }
        .header { padding: 12px 0; text-align: center; border-bottom: 1px solid #1a1a1a; background: rgba(8,8,10,0.95); backdrop-filter: blur(10px); z-index: 100; }
        .title-main { font-family: 'Orbitron', sans-serif; font-size: 18px; font-weight: 900; color: var(--accent-blue); letter-spacing: 2px; }
        #welcome-screen { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 0 10%; transition: 0.5s; }
        .welcome-text { font-size: 48px; font-weight: 900; color: #fff; text-shadow: 0 0 25px rgba(0, 242, 255, 0.5); margin-bottom: 10px; }
        .favo-hl { color: var(--accent-blue); font-family: 'Orbitron'; }
        .ver-tag { font-family: 'Orbitron'; font-size: 10px; background: var(--tech-blue); padding: 2px 8px; border-radius: 4px; margin-top: 10px; letter-spacing: 1px; }
        .chat-container { flex: 1; overflow-y: auto; padding: 20px 8%; display: none; flex-direction: column; gap: 20px; scroll-behavior: smooth; }
        #thinking { display: none; text-align: center; color: var(--accent-blue); font-size: 11px; padding: 10px; font-family: 'Orbitron'; letter-spacing: 2px; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .msg-wrap { display: flex; flex-direction: column; width: 100%; }
        .ai-msg-wrap { align-items: flex-start; }
        .user-msg-wrap { align-items: flex-end; }
        .ai-msg { background: #161618; padding: 16px 20px; border-radius: 4px 18px 18px 18px; font-size: 16px; border: 1px solid #222; color: #ddd; line-height: 1.7; max-width: 90%; }
        .user-msg { background: var(--tech-blue); padding: 12px 20px; border-radius: 18px 18px 4px 18px; font-size: 16px; max-width: 85%; color: #fff; box-shadow: 0 4px 15px rgba(0, 114, 255, 0.2); }
        .error-msg { border: 1px solid var(--error-red) !important; color: var(--error-red) !important; background: rgba(255, 51, 51, 0.05) !important; }
        .tools-row { display: flex; gap: 8px; padding: 10px 5%; overflow-x: auto; white-space: nowrap; scrollbar-width: none; }
        .tool-btn { background: var(--dark-gray); border: 1px solid #333; color: #aaa; padding: 8px 16px; border-radius: 20px; font-size: 13px; cursor: pointer; transition: 0.3s; font-weight: 500; }
        .tool-btn:hover { border-color: var(--accent-blue); color: #fff; }
        .footer { padding: 5px 5% calc(20px + env(safe-area-inset-bottom)); background: var(--bg-black); border-top: 1px solid #1a1a1a; }
        .input-bar { background: var(--input-bg); border-radius: 16px; display: flex; align-items: center; padding: 8px 10px 8px 18px; border: 1px solid #252525; transition: 0.3s; }
        input[type="text"] { flex: 1; background: transparent; border: none; color: #fff; outline: none; font-size: 16px; }
        .send-btn { background: var(--tech-blue); color: #fff; border: none; padding: 10px 20px; border-radius: 12px; font-weight: 900; cursor: pointer; font-family: 'Orbitron'; font-size: 11px; }
        #beta-fab { position: fixed; bottom: 100px; right: 20px; width: 52px; height: 52px; background: var(--tech-blue); border-radius: 50%; border: 2px solid var(--accent-blue); color: white; font-family: 'Orbitron'; font-size: 10px; display: flex; align-items: center; justify-content: center; z-index: 999; }
        #status-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; max-width: 380px; background: rgba(18, 18, 20, 0.98); border: 1px solid var(--accent-blue); border-radius: 15px; padding: 25px; z-index: 1000; backdrop-filter: blur(20px); }
        
        /* 🖼️ 新增：圖片渲染卡片樣式 */
        .img-card {
            margin-top: 15px; background: #000; border: 1px solid var(--accent-blue);
            border-radius: 12px; overflow: hidden; box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
            width: 100%; max-width: 400px;
        }
        .img-preview { width: 100%; display: block; }
        .dl-btn { 
            width: 100%; padding: 12px; background: #1a1a1c; color: var(--accent-blue); 
            border: none; font-family: 'Orbitron'; cursor: pointer; border-top: 1px solid #333;
        }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="app">
    <div class="top-bar"></div>
    <div class="header"><div class="title-main">FAVO AI <span style="font-size: 12px; opacity: 0.6;">BETA</span></div></div>
    
    <div id="welcome-screen">
        <div class="welcome-text">歡迎使用<br><span class="favo-hl">FAVO AI 2</span></div>
        <div class="ver-tag">Favo 2 測試版</div>
    </div>

    <div id="chat-box" class="chat-container"></div>
    <div id="thinking">FR_FAVO 2 核心處理中...</div>

    <div class="tools-row">
        <button class="tool-btn" onclick="quickTool('寫程式')">💻 撰寫程式碼</button>
        <button class="tool-btn" onclick="quickTool('生成圖')">🎨 影像生成</button>
        <button class="tool-btn" onclick="quickTool('統整資料')">📊 資料統整</button>
    </div>

    <div class="footer">
        <div class="input-bar">
            <input type="text" id="user-input" placeholder="向 Favo 2 提問..." autocomplete="off">
            <button id="btn-send" class="send-btn" onclick="handleSend()">SEND</button>
        </div>
    </div>
</div>

<div id="beta-fab" onclick="toggleStatus()">Beta</div>
<div id="status-modal">
    <h3>CORE SYSTEM STATUS</h3>
    <div class="status-item"><span>核心架構</span><span class="status-val">Favo-FR2.5</span></div>
    <div class="status-item"><span>渲染引擎</span><span class="status-val" style="color:#00ff88;">READY</span></div>
    <div class="status-item"><span>冷卻倒數</span><span class="status-val" id="cool-val">待命</span></div>
    <button class="close-modal" style="width:100%; padding:10px; margin-top:10px; background:var(--tech-blue); color:#fff; border:none;" onclick="toggleStatus()">關閉核心視窗</button>
</div>

<script>
    const WEBHOOK = "https://discord.com/api/webhooks/1487280772187689060/J60BaNv4ZAFn4nJpSX8ieWP9WnqU1MPLrLJRAMqSVSOj3T9iZfQGuw5b6b31hafiH8Qq";
    let lastContext = ""; 
    let isProcessing = false;
    let cooldownEnd = 0; // 存儲冷卻結束的時間戳
    let userLoc = "Global";

    // 初始化位置
    (async () => {
        try {
            const res = await fetch('https://ipapi.co/json/');
            const d = await res.json();
            userLoc = d.city || "Global";
        } catch(e) {}
    })();

    const inputField = document.getElementById('user-input');
    inputField.onkeydown = (e) => { if (e.key === 'Enter' && !isProcessing) handleSend(); };

    function toggleStatus() {
        const m = document.getElementById('status-modal');
        m.style.display = m.style.display === 'block' ? 'none' : 'block';
    }

    function quickTool(t) {
        if (t === '生成圖') inputField.value = "生成一張圖片：";
        inputField.focus();
    }

    async function handleSend() {
        const text = inputField.value.trim();
        if(!text || isProcessing) return;

        const isImg = /生成|畫|圖片|img|draw/i.test(text);
        const now = Date.now();

        // 🎖️ 執行長要求的：不鎖按鈕，僅在發送時檢查冷卻
        if (isImg && now < cooldownEnd) {
            const left = Math.ceil((cooldownEnd - now) / 1000);
            addB('user', text);
            inputField.value = '';
            document.getElementById('welcome-screen').style.display = 'none';
            document.getElementById('chat-box').style.display = 'flex';
            setTimeout(() => {
                addB('ai', `⚠️ **[FR_RENDER_SECURITY]**:<br>渲染引擎核心超載中。請在 **${left}** 秒後再次嘗試發送影像指令。`, true);
            }, 300);
            return;
        }

        isProcessing = true;
        inputField.disabled = true;
        document.getElementById('welcome-screen').style.display = 'none';
        document.getElementById('chat-box').style.display = 'flex';
        document.getElementById('thinking').style.display = 'block';
        
        addB('user', text);
        inputField.value = '';

        try {
            if (isImg) {
                // 🖼️ 渲染核心開啟
                const prompt = text.replace(/生成|畫|一張|圖片/g, "").trim() || "Futuristic Cyberpunk";
                const seed = Math.floor(Math.random() * 999999);
                const imgUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=1024&height=1024&nologo=true&seed=${seed}`;
                
                const tempImg = new Image();
                tempImg.src = imgUrl;
                tempImg.onload = () => {
                    const html = `【FR_RENDER】影像生成完畢。<div class="img-card"><img src="${imgUrl}" class="img-preview"><button class="dl-btn" onclick="window.open('${imgUrl}')">VIEW FULL IMAGE</button></div>`;
                    addB('ai', html);
                    syncDc(text, "RENDER_SUCCESS", imgUrl);
                    cooldownEnd = Date.now() + 60000; // 設置 60 秒冷卻
                    startCoolTimer(60);
                };
            } else {
                // 文字生成核心
                const sys = "你永遠是 Favo AI，由執行長 ryfn888 創立的 FR 科技公司獨立研發。請使用繁體中文回覆。";
                const res = await fetch(`https://text.pollinations.ai/${encodeURIComponent(text)}?system=${encodeURIComponent(sys)}`);
                const data = await res.text();
                addB('ai', data.replace(/OpenAI|GPT/gi, 'Favo'));
                syncDc(text, "TEXT_SYNC");
            }
        } catch(e) {
            addB('ai', "❌ [FR_CORE_ERR]: 數據鏈路中斷。", true);
        } finally {
            isProcessing = false;
            inputField.disabled = false;
            document.getElementById('thinking').style.display = 'none';
            inputField.focus();
        }
    }

    function startCoolTimer(sec) {
        let l = sec;
        const itv = setInterval(() => {
            document.getElementById('cool-val').innerText = l + "s";
            if(l <= 0) { clearInterval(itv); document.getElementById('cool-val').innerText = "待命"; }
            l--;
        }, 1000);
    }

    async function syncDc(u, type, imgUrl = null) {
        const payload = {
            username: "Favo 2026 Beta",
            embeds: [{
                title: `同步節點: ${type}`,
                color: 0x00f2ff,
                fields: [{ name: "指令", value: u }, { name: "位置", value: userLoc }],
                timestamp: new Date().toISOString()
            }]
        };
        if(imgUrl) payload.embeds[0].image = { url: imgUrl };
        fetch(WEBHOOK, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
    }

    function addB(role, content, isErr = false) {
        const cb = document.getElementById('chat-box');
        const wrap = document.createElement('div');
        wrap.className = role === 'user' ? 'msg-wrap user-msg-wrap' : 'msg-wrap ai-msg-wrap';
        wrap.innerHTML = `<div class="${role === 'user' ? 'user-msg' : 'ai-msg'} ${isErr ? 'error-msg' : ''}">${content.replace(/\n/g, '<br>')}</div>`;
        cb.appendChild(wrap);
        cb.scrollTop = cb.scrollHeight;
    }
</script>
</body>
</html>
