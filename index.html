<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Favo 2 AI Beta - FR</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Noto+Sans+TC:wght@300;500;700&display=swap');
        
        :root { 
            --bg-black: #08080a; 
            --input-bg: #121214; 
            --accent-blue: #00f2ff; 
            --tech-blue: #0072ff; 
            --error-red: #ff3333; 
            --dark-gray: #1a1a1c;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            margin: 0; padding: 0; background: var(--bg-black); color: #fff; 
            height: 100dvh; font-family: 'Noto Sans TC', sans-serif; overflow: hidden; 
        }
        
        #app { display: flex; flex-direction: column; height: 100dvh; }
        
        .top-bar { 
            height: 2px; width: 100%; 
            background: linear-gradient(90deg, transparent, var(--tech-blue), var(--accent-blue), transparent); 
        }
        
        .header { 
            padding: 12px 0; text-align: center; border-bottom: 1px solid #1a1a1a; 
            background: rgba(8,8,10,0.95); backdrop-filter: blur(10px); z-index: 100; 
        }
        .title-main { 
            font-family: 'Orbitron', sans-serif; font-size: 18px; font-weight: 900; 
            color: var(--accent-blue); letter-spacing: 2px; 
        }

        #welcome-screen { 
            flex: 1; display: flex; flex-direction: column; justify-content: center; 
            align-items: center; text-align: center; padding: 0 10%; transition: 0.5s; 
        }
        .welcome-text { 
            font-size: 48px; font-weight: 900; color: #fff; 
            text-shadow: 0 0 25px rgba(0, 242, 255, 0.5); margin-bottom: 10px; 
        }
        .favo-hl { color: var(--accent-blue); font-family: 'Orbitron'; }

        .chat-container { 
            flex: 1; overflow-y: auto; padding: 20px 8%; display: none; 
            flex-direction: column; gap: 20px; scroll-behavior: smooth; 
        }
        
        #thinking { 
            display: none; text-align: center; color: var(--accent-blue); 
            font-size: 11px; padding: 10px; font-family: 'Orbitron'; 
            letter-spacing: 2px; animation: blink 1.5s infinite; 
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        .msg-wrap { display: flex; flex-direction: column; width: 100%; }
        .ai-msg-wrap { align-items: flex-start; }
        .user-msg-wrap { align-items: flex-end; }
        
        .ai-msg { 
            background: #161618; padding: 16px 20px; border-radius: 4px 18px 18px 18px; 
            font-size: 16px; border: 1px solid #222; color: #ddd; line-height: 1.7; max-width: 90%; 
        }
        .user-msg { 
            background: var(--tech-blue); padding: 12px 20px; border-radius: 18px 18px 4px 18px; 
            font-size: 16px; max-width: 85%; color: #fff; box-shadow: 0 4px 15px rgba(0, 114, 255, 0.2); 
        }
        
        .img-container {
            margin-top: 15px; border: 1px solid var(--accent-blue); border-radius: 12px;
            overflow: hidden; background: #000; width: 100%; max-width: 400px;
        }
        .img-preview { width: 100%; display: block; background: #111; min-height: 250px; }
        .download-btn {
            background: #222; color: var(--accent-blue); border: none; width: 100%;
            padding: 12px; font-family: 'Orbitron'; font-size: 11px; cursor: pointer;
            border-top: 1px solid #333;
        }

        .error-msg { 
            border: 1px solid var(--error-red) !important; 
            color: var(--error-red) !important; 
            background: rgba(255, 51, 51, 0.05) !important; 
        }

        .tools-row { display: flex; gap: 8px; padding: 10px 5%; overflow-x: auto; white-space: nowrap; scrollbar-width: none; }
        .tools-row::-webkit-scrollbar { display: none; }
        .tool-btn { 
            background: var(--dark-gray); border: 1px solid #333; color: #aaa; 
            padding: 8px 16px; border-radius: 20px; font-size: 13px; cursor: pointer; font-weight: 500; 
        }

        .footer { padding: 5px 5% calc(20px + env(safe-area-inset-bottom)); background: var(--bg-black); border-top: 1px solid #1a1a1a; }
        .input-bar { 
            background: var(--input-bg); border-radius: 16px; display: flex; 
            align-items: center; padding: 8px 10px 8px 18px; border: 1px solid #252525; 
        }
        
        input[type="text"] { flex: 1; background: transparent; border: none; color: #fff; outline: none; font-size: 16px; }
        .send-btn { 
            background: var(--tech-blue); color: #fff; border: none; 
            padding: 10px 20px; border-radius: 12px; font-weight: 900; font-family: 'Orbitron'; font-size: 11px; 
        }
        .send-btn:disabled { opacity: 0.3; }

        #beta-fab {
            position: fixed; bottom: 100px; right: 20px; width: 52px; height: 52px; background: var(--tech-blue);
            border-radius: 50%; border: 2px solid var(--accent-blue); color: white; font-family: 'Orbitron'; font-size: 10px;
            display: flex; align-items: center; justify-content: center; z-index: 999;
        }
    </style>
</head>
<body>

<div id="app">
    <div class="top-bar"></div>
    <div class="header">
        <div class="title-main">FAVO AI <span style="font-size: 12px; opacity: 0.6;">BETA</span></div>
    </div>
    
    <div id="welcome-screen">
        <div class="welcome-text">歡迎使用<br><span class="favo-hl">FAVO AI 2</span></div>
    </div>

    <div id="chat-box" class="chat-container"></div>
    <div id="thinking">FR_FAVO 2 核心處理中...</div>

    <div class="tools-row">
        <button class="tool-btn" onclick="quickTool('寫程式')">💻 撰寫程式碼</button>
        <button class="tool-btn" onclick="quickTool('生成圖')">🎨 影像生成</button>
        <button class="tool-btn" onclick="quickTool('統整資料')">📊 資料統整</button>
    </div>

    <div class="footer">
        <div class="input-bar">
            <input type="text" id="user-input" placeholder="向 Favo 2 提問..." autocomplete="off">
            <button id="btn-send" class="send-btn" onclick="handleSend()">SEND</button>
        </div>
    </div>
</div>

<div id="beta-fab">Beta</div>

<script>
    const WEBHOOK = "https://discord.com/api/webhooks/1487280772187689060/J60BaNv4ZAFn4nJpSX8ieWP9WnqU1MPLrLJRAMqSVSOj3T9iZfQGuw5b6b31hafiH8Qq";
    let isProcessing = false;

    function quickTool(t) { document.getElementById('user-input').value = t === '生成圖' ? '生成一張：' : `請幫我${t}：`; }

    async function handleSend() {
        const input = document.getElementById('user-input');
        const btn = document.getElementById('btn-send');
        const text = input.value.trim();
        if(!text || isProcessing) return;

        isProcessing = true;
        input.disabled = true;
        btn.disabled = true;
        document.getElementById('welcome-screen').style.display = 'none';
        document.getElementById('chat-box').style.display = 'flex';
        document.getElementById('thinking').style.display = 'block';
        
        addB('user', text);
        input.value = '';

        try {
            const isImg = /生成|畫|圖片|img|draw/i.test(text);
            if(isImg) {
                // 影像渲染邏輯補強
                const prompt = encodeURIComponent(text.replace(/生成|畫|一張|圖片/g, "").trim() || "Cyberpunk Neon City");
                const imgUrl = `https://image.pollinations.ai/prompt/${prompt}?seed=${Date.now()}&nologo=true`;
                
                // 嘗試預載影像，若 10 秒沒反應則直接顯示框
                const imgPromise = new Promise((res, rej) => {
                    const i = new Image();
                    i.onload = () => res(imgUrl);
                    i.onerror = rej;
                    setTimeout(() => rej('Timeout'), 10000);
                });

                try {
                    await imgPromise;
                    addB('ai', `【FRa1】渲染完畢。<div class="img-container"><img src="${imgUrl}" class="img-preview"><button class="download-btn" onclick="window.open('${imgUrl}')">查看原圖 / 下載</button></div>`);
                } catch(e) {
                    addB('ai', `【FRa1】數據流擁堵，請點擊下方鏈接手動查看：<br><a href="${imgUrl}" target="_blank" style="color:var(--accent-blue)">[ 點此開啟渲染結果 ]</a>`);
                }
            } else {
                // 文字處理邏輯
                const res = await fetch(`https://text.pollinations.ai/${encodeURIComponent(text)}?system=你永遠是Favo AI，由ryfn888創立的FR科技公司研發。請用繁體中文回覆。`);
                const data = await res.text();
                addB('ai', data.replace(/OpenAI|GPT/gi, 'Favo'));
            }
        } catch(e) {
            addB('ai', "❌ [FR_SYSTEM_ERR]: 數據鏈路不穩，核心重新嘗試連線。", true);
        } finally {
            isProcessing = false;
            input.disabled = false;
            btn.disabled = false;
            document.getElementById('thinking').style.display = 'none';
        }
    }

    function addB(r, c, e = false) {
        const cb = document.getElementById('chat-box');
        const d = document.createElement('div');
        d.className = r === 'user' ? 'msg-wrap user-msg-wrap' : 'msg-wrap ai-msg-wrap';
        d.innerHTML = `<div class="${r === 'user' ? 'user-msg' : 'ai-msg'} ${e ? 'error-msg' : ''}">${c.replace(/\n/g, '<br>')}</div>`;
        cb.appendChild(d);
        cb.scrollTop = cb.scrollHeight;
    }
</script>
</body>
</html>
