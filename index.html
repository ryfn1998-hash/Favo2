<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>FAVO AI - 系統維護</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Noto+Sans+TC:wght@500;700&display=swap');
        
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background: #050507; font-family: 'Noto Sans TC', sans-serif;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        /* 科技背景光暈 */
        .scanline {
            width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%; position: absolute; z-index: 1;
        }

        /* 橫向維修主視窗 */
        #maintenance-card {
            position: relative; z-index: 10;
            width: 90%; max-width: 650px; /* 寬度加長 */
            height: auto; min-height: 220px; /* 高度縮減 */
            background: rgba(10, 10, 12, 0.9);
            border-left: 5px solid #00f2ff; /* 側邊飾條 */
            border-right: 1px solid rgba(0, 242, 255, 0.3);
            border-top: 1px solid rgba(0, 242, 255, 0.3);
            border-bottom: 1px solid rgba(0, 242, 255, 0.3);
            padding: 30px 40px;
            display: flex; flex-direction: row; /* 改為橫向排列 */
            align-items: center; gap: 30px;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(0, 242, 255, 0.05);
            backdrop-filter: blur(15px);
            animation: slideIn 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* 左側狀態區 */
        .status-left { flex: 1.5; text-align: left; }
        
        .time-tag {
            font-family: 'Orbitron', sans-serif;
            font-size: 12px; color: #00f2ff;
            background: rgba(0, 242, 255, 0.1);
            padding: 4px 10px; border-radius: 4px;
            display: inline-block; margin-bottom: 10px;
        }

        h2 {
            font-family: 'Orbitron', sans-serif;
            color: #fff; font-size: 20px; margin: 0 0 10px 0;
            letter-spacing: 1px; text-transform: uppercase;
        }

        p {
            color: #888; font-size: 14px; margin: 0; line-height: 1.6;
        }

        /* 右側動作區 */
        .action-right {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            padding-left: 30px;
        }

        .dc-link {
            text-align: center; text-decoration: none;
            color: #fff; background: #5865F2;
            padding: 12px 20px; border-radius: 8px;
            font-weight: 700; font-size: 14px;
            transition: all 0.3s; width: 100%;
            box-shadow: 0 4px 15px rgba(88, 101, 242, 0.3);
        }

        .dc-link:hover {
            background: #4752c4; transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(88, 101, 242, 0.5);
        }

        .url-text {
            font-size: 10px; color: #555; margin-top: 10px;
            font-family: 'Orbitron'; letter-spacing: 0.5px;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* 手機直向適配 */
        @media (max-width: 600px) {
            #maintenance-card { 
                flex-direction: column; text-align: center; 
                padding: 30px 20px; width: 85%;
            }
            .status-left { text-align: center; }
            .action-right { border-left: none; border-top: 1px solid rgba(255, 255, 255, 0.1); padding: 20px 0 0 0; width: 100%; }
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="scanline"></div>

    <div id="maintenance-card">
        <div class="status-left">
            <div class="time-tag">SYSTEM LOG: 2026.3/29 1:03</div>
            <h2>FAVO核心 正在維修 暫停使用</h2>
            <p>FAVO產品正在維修，預計下週繼續啟用<br>現有服務已暫時離線。詳情請關注官方頻道。</p>
        </div>

        <div class="action-right">
            <a href="https://discord.gg/mns2Ra4Yt2" class="dc-link" target="_blank">
                JOIN DISCORD
            </a>
            <div class="url-text">mns2Ra4Yt2</div>
        </div>
    </div>

</body>
</html>
