<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Favo 2 AI - FR Technology</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Noto+Sans+TC:wght@300;500;700&display=swap');
        :root { --bg-black: #08080a; --input-bg: #121214; --accent-blue: #00f2ff; --tech-blue: #0072ff; --dark-gray: #1a1a1c; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; background: var(--bg-black); color: #fff; height: 100dvh; font-family: 'Noto Sans TC', sans-serif; overflow: hidden; user-select: none; }
        
        #app { display: flex; flex-direction: column; height: 100dvh; }
        .top-bar { height: 2px; width: 100%; background: linear-gradient(90deg, transparent, var(--tech-blue), var(--accent-blue), transparent); }
        .header { padding: 12px 0; text-align: center; border-bottom: 1px solid #1a1a1a; background: rgba(8,8,10,0.95); backdrop-filter: blur(10px); z-index: 100; }
        .title-main { font-family: 'Orbitron', sans-serif; font-size: 18px; font-weight: 900; color: var(--accent-blue); letter-spacing: 2px; }

        #welcome-screen { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 0 10%; transition: 0.5s; }
        .welcome-text { font-size: 42px; font-weight: 900; color: #fff; text-shadow: 0 0 25px rgba(0, 242, 255, 0.5); }
        .favo-hl { color: var(--accent-blue); font-family: 'Orbitron'; }

        .chat-container { flex: 1; overflow-y: auto; padding: 20px 8%; display: none; flex-direction: column; gap: 20px; scroll-behavior: smooth; }
        #thinking { display: none; text-align: center; color: var(--accent-blue); font-size: 11px; padding: 10px; font-family: 'Orbitron'; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        .msg-wrap { display: flex; flex-direction: column; width: 100%; }
        .ai-msg { background: #161618; padding: 16px 20px; border-radius: 4px 18px 18px 18px; font-size: 16px; border: 1px solid #222; color: #ddd; line-height: 1.7; max-width: 90%; align-self: flex-start; word-break: break-all; white-space: pre-wrap; }
        .user-msg { background: var(--tech-blue); padding: 12px 20px; border-radius: 18px 18px 4px 18px; font-size: 16px; max-width: 85%; color: #fff; align-self: flex-end; box-shadow: 0 4px 15px rgba(0, 114, 255, 0.2); }
        
        .footer { padding: 10px 5% calc(20px + env(safe-area-inset-bottom)); background: var(--bg-black); border-top: 1px solid #1a1a1a; }
        .input-bar { background: var(--input-bg); border-radius: 16px; display: flex; align-items: center; padding: 8px 18px; border: 1px solid #252525; }
        textarea { flex: 1; background: transparent; border: none; color: #fff; outline: none; font-size: 16px; user-select: text; resize: none; height: 26px; line-height: 26px; font-family: inherit; }
        .send-btn { background: var(--tech-blue); color: #fff; border: none; padding: 8px 18px; border-radius: 12px; font-weight: 900; cursor: pointer; font-family: 'Orbitron'; font-size: 11px; margin-left: 10px; }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="app">
    <div class="top-bar"></div>
    <div class="header"><div class="title-main">FAVO AI <span style="font-size: 10px; opacity: 0.5;">V3.3.5</span></div></div>
    
    <div id="welcome-screen">
        <div class="welcome-text">WELCOME TO<br><span class="favo-hl">FAVO AI 2</span></div>
        <p style="color:#666; font-size:12px;">FR Technology Security System</p>
    </div>

    <div id="chat-box" class="chat-container"></div>
    <div id="thinking">CORE_LINKING...</div>

    <div class="footer">
        <div class="input-bar">
            <textarea id="user-input" placeholder="Enter 發送 / Shift+Enter 換行..." rows="1"></textarea>
            <button id="btn-send" class="send-btn" onclick="handleSend()">SEND</button>
        </div>
    </div>
</div>

<script>
    // 🛡️ 高級防禦：禁止 Ctrl+U, F12, 右鍵
    window.addEventListener('keydown', (e) => {
        if (e.key === "F12" || (e.ctrlKey && (e.key === "u" || e.key === "s" || e.key === "i" || e.key === "j"))) {
            e.preventDefault();
            return false;
        }
    });

    let isProcessing = false;
    let chatHistory = [];
    const inputArea = document.getElementById('user-input');

    // ⌨️ 方便操作：Shift+Enter 換行，Enter 發送
    inputArea.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            handleSend();
        }
    });

    inputArea.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = (this.scrollHeight > 150 ? 150 : this.scrollHeight) + 'px';
    });

    async function handleSend() {
        const text = inputArea.value.trim();
        if(!text || isProcessing) return;

        isProcessing = true;
        inputArea.disabled = true;
        document.getElementById('welcome-screen').style.display = 'none';
        document.getElementById('chat-box').style.display = 'flex';
        document.getElementById('thinking').style.display = 'block';
        
        addB('user', text);
        inputArea.value = '';
        inputArea.style.height = '26px';

        // 🎖️ 自動切換核心邏輯 (核心 A: Mistral / 核心 B: GPT-4o / 核心 C: Claude)
        const cores = ["mistral", "openai", "claude"];
        let finalResponse = "";

        for (let core of cores) {
            try {
                const sys = "你是 Favo AI，由執行長 ryfn888 創立的 FR 科技研發。請務必用繁體中文回覆。嚴禁輸出 JSON 或思考過程。";
                const response = await fetch(`https://text.pollinations.ai/${encodeURIComponent(text)}?model=${core}&system=${encodeURIComponent(sys)}&cache=false&seed=${Math.random()}`);
                
                if (!response.ok) continue;
                
                let rawData = await response.text();
                
                // 🎖️ 核心過濾器：暴力清洗掉任何 API 吐出來的垃圾資訊
                finalResponse = rawData
                    .replace(/\{"reasoning_content":.*?\}/gs, "") // 清除新版 JSON 思考
                    .replace(/\{"content":.*?\}/gs, "")          // 清除舊版 JSON 內容
                    .replace(/<think>.*?<\/think>/gs, "")       // 清除 DeepSeek 思考標籤
                    .trim();

                if (finalResponse.length > 0) break; 
            } catch (err) {
                console.warn(`核心 ${core} 失聯，切換中...`);
            }
        }

        if (finalResponse) {
            addB('ai', finalResponse);
        } else {
            addB('ai', "❌ [FATAL_ERROR]: 所有核心通訊中斷。請檢查網絡。");
        }

        isProcessing = false;
        inputArea.disabled = false;
        document.getElementById('thinking').style.display = 'none';
        inputArea.focus();
    }

    function addB(role, content) {
        const cb = document.getElementById('chat-box');
        const wrap = document.createElement('div');
        wrap.className = 'msg-wrap';
        wrap.style.alignItems = role === 'user' ? 'flex-end' : 'flex-start';
        
        const box = document.createElement('div');
        box.className = role === 'user' ? 'user-msg' : 'ai-msg';
        box.innerText = content; // 確保安全性
        
        wrap.appendChild(box);
        cb.appendChild(wrap);
        cb.scrollTop = cb.scrollHeight;
    }
</script>
</body>
</html>
